plugins {
    id "com.android.application"
    id "com.google.gms.google-services"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def demoKeystoreProperties = new Properties()
def demoKeystorePropertiesFile = rootProject.file('demo-keystore.properties')
if (!demoKeystorePropertiesFile.exists()) {
    throw new GradleException('Missing demo-keystore.properties required for shared Android evaluation signing.')
}

demoKeystorePropertiesFile.withReader('UTF-8') { reader ->
    demoKeystoreProperties.load(reader)
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}


android {
    namespace "com.osobuxs.newsapp.symmetry"

    compileSdkVersion flutter.compileSdkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.osobuxs.newsapp.symmetry"
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled = true

    }

    signingConfigs {
        demo {
            keyAlias demoKeystoreProperties['keyAlias']
            keyPassword demoKeystoreProperties['keyPassword']
            storeFile rootProject.file(demoKeystoreProperties['storeFile'])
            storePassword demoKeystoreProperties['storePassword']
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.demo
        }

        release {
            signingConfig signingConfigs.demo
        }
    }
}

flutter {
    source '../..'
}

ext {
    kotlin_version="1.6.10"
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
    def multidex_version = "2.0.1"
    implementation("androidx.multidex:multidex:$multidex_version")
}
